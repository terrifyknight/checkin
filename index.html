<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHECKIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Loại bỏ hoàn toàn viền và background thô của thư viện */
    #qrReader { border: none !important; background: transparent !important; }
    #qrReader video { width: 100% !important; height: auto !important; border-radius: 1rem !important; object-fit: cover !important; }
    #qrReader button { display: none !important; }
    #qrReader img { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-white p-2 sm:p-4 flex flex-col items-center justify-start">

  <div class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden mt-6">
    <!-- Header -->
    <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-6 py-5 flex items-center justify-between text-center relative">
      
      <!-- BÊN TRÁI: Chọn tệp ảnh -->
      <label class="cursor-pointer p-2.5 bg-white/10 hover:bg-white/20 active:scale-95 rounded-xl transition-all border border-white/10 shadow-lg flex items-center justify-center" title="Tải ảnh QR từ máy / Zalo">
        <input type="file" id="uploadImageInput" accept="image/*" onchange="checkinByImage(event)" class="hidden" />
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </label>

      <!-- GIỮA: Tiêu đề -->
      <div class="flex-1">
        <h1 class="text-2xl font-black tracking-wider text-white">CHECKIN</h1>
        <p class="text-emerald-100 text-[10px] mt-0.5 opacity-90">Bấm icon bên trái để chọn ảnh | Bấm icon bên phải để bật cam</p>
      </div>

      <!-- BÊN PHẢI: Kích hoạt camera -->
      <button type="button" onclick="toggleCamera()" class="p-2.5 bg-white/10 hover:bg-white/20 active:scale-95 rounded-xl transition-all border border-white/10 shadow-lg flex items-center justify-center" title="Bật / Tắt Camera Quét">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h.01M9.21 18.57l.707.707M15.55 6.343l.707-.707M4.929 19.071l.707-.707M19.071 4.929l-.707.707M4 12h1m8-4a4 4 0 11-8 0 4 4 0 018 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h2v2H7V7zm8 0h2v2h-2V7zm0 8h2v2h-2v-2z" />
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-5">
      <!-- LỰA CHỌN NHÀ MÁY -->
      <div>
        <label class="block text-sm font-bold text-slate-300 mb-2">Nhà máy thực hiện điểm danh *</label>
        <select id="factoryCode" class="w-full px-4 py-3 rounded-xl border border-slate-600 text-white font-semibold bg-slate-700 focus:outline-none focus:border-emerald-500">
          <option value="">-- Chọn Nhà máy điểm danh --</option>
          <option value="HONHAI-FK">HONHAI-FK / FUKANG</option>
          <option value="LUXE QC2&3">LUXE QC2&3</option>
          <option value="LUXE QC1">LUXE QC1</option>
          <option value="LUXE VT">LUXE VT</option>
          <option value="GTK NAM SƠN">GTK NAM SƠN</option>
          <option value="ADTEK">ADTEK</option>
          <option value="LENS">LENS</option>
          <option value="WNC HÀ NAM">WNC HÀ NAM</option>
          <option value="FUSHAN">FUSHAN</option>
          <option value="NEWWING">NEWWING</option>
          <option value="FOX-QUẢNG NINH">FOX-QUẢNG NINH</option>
          <option value="AMPHENOL">AMPHENOL</option>
          <option value="BIEL VSIP">BIEL VSIP</option>
          <option value="BIEL HD">BIEL HP</option>
        </select>
      </div>

      <!-- KHU VỰC CAMERA: KHÔNG HIỆN GÌ KHI CHƯA BẬT, FULL BOX KHI CÓ CAM -->
      <div id="cameraContainer" class="w-full relative hidden">
        <div id="qrReader" class="w-full rounded-2xl overflow-hidden shadow-inner"></div>
        
        <!-- Nút đổi cam nằm hoàn toàn bên trong và nổi lên trên luồng video -->
        <button id="btnSwitch" type="button" onclick="switchCamera()" class="absolute top-4 right-4 z-10 px-3 py-1.5 bg-slate-900/80 hover:bg-slate-800 border border-slate-600 rounded-xl text-xs font-semibold shadow-md flex items-center gap-1 active:scale-95 transition-all text-white">
          Đổi Cam 🔄
        </button>
      </div>

      <!-- KHỐI NHẬP THỦ CÔNG KHI THẺ CCCD BỊ MỜ/XƯỚC MÃ -->
      <div class="border-t border-slate-700 pt-4">
        <label class="block text-sm font-medium text-slate-400 mb-1.5">Hoặc nhập tay số CCCD:</label>
        <div class="flex space-x-2">
          <input type="text" id="manualCccd" placeholder="Nhập đủ 12 số" pattern="[0-9]{12}" class="flex-1 px-4 py-2 rounded-xl border border-slate-600 text-white bg-slate-700 focus:outline-none focus:border-emerald-500">
          <button type="button" onclick="submitManualAttendance()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-xl transition-all">Gửi</button>
        </div>
      </div>
    </div>
  </div>

  <!-- POPUP THÔNG BÁO TRẠNG THÁI -->
  <div id="resultModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 backdrop-blur-sm z-50">
    <div id="modalBox" class="bg-slate-800 rounded-3xl p-6 w-full max-w-sm text-center border border-slate-700 shadow-2xl">
      <div id="modalIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl">✓</div>
      <h2 id="modalTitle" class="text-xl font-bold text-white mb-2">Thành Công</h2>
      <p id="modalMsg" class="text-sm text-slate-300 mb-5 leading-relaxed bg-slate-900/50 p-4 rounded-xl border border-slate-700 font-medium whitespace-pre-line text-center"></p>
      <button onclick="closeModal()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-xl transition-all">Tiếp tục điểm danh</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwg7SmjbCvwbUjgTx0kF125BQTUMZCs3pZkJ9t1UGLK0eJ-cj5z_f6LmKrns4REW_93/exec"; 

    let html5QrCode = null;
    let isCamOpen = false;
    let validBackCameras = []; 
    let currentCamIndex = 0;
    const factorySelect = document.getElementById('factoryCode');

    function initCameraList() {
      Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length > 0) {
          validBackCameras = devices.filter(d => {
            const label = d.label.toLowerCase();
            const isFront = label.includes('front') || label.includes('user') || label.includes('trước');
            const isUltraWide = label.includes('wide') || label.includes('ultra') || label.includes('rộng');
            return !isFront && !isUltraWide;
          });

          if (validBackCameras.length === 0) {
            validBackCameras = devices.filter(d => {
              const label = d.label.toLowerCase();
              return !label.includes('front') && !label.includes('user') && !label.includes('trước');
            });
          }

          if (validBackCameras.length === 0) {
            validBackCameras = devices;
          }
          currentCamIndex = validBackCameras.length - 1;
        }
      }).catch(err => console.log("Lỗi khởi tạo danh sách camera: " + err));
    }
    window.addEventListener('DOMContentLoaded', initCameraList);

    async function toggleCamera() {
      if (!factorySelect.value) {
        alert("⚠️ Vui lòng chọn Nhà máy thực hiện điểm danh trước khi kích hoạt Camera!");
        return;
      }
      
      if (!isCamOpen) {
        if (validBackCameras.length === 0) {
          alert("Không tìm thấy cụm camera sau khả dụng.");
          return;
        }
        // Hiện khung chứa camera lên trước khi bắt đầu stream
        document.getElementById('cameraContainer').classList.remove('hidden');
        startScanning(validBackCameras[currentCamIndex].id);
      } else {
        stopCamera();
      }
    }

    function startScanning(cameraId) {
      if (!html5QrCode) { html5QrCode = new Html5Qrcode("qrReader"); }

      const config = {
        fps: 30,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          // Tính toán khung định vị quét vuông vắn tương đối theo tỉ lệ thực tế
          const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          const boxSize = Math.floor(minEdge * 0.7);
          return { width: boxSize, height: boxSize };
        },
        videoConstraints: {
          deviceId: { exact: cameraId },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      };

      html5QrCode.start(
        cameraId,
        config,
        (rawText) => { processQrData(rawText); },
        (err) => {}
      ).then(() => {
        isCamOpen = true;
        setupZoomControls();
      }).catch(err => {
        html5QrCode.start(cameraId, { fps: 30, qrbox: 200 }, (rawText) => { processQrData(rawText); }, (err) => {})
        .then(() => {
          isCamOpen = true;
          setupZoomControls();
        }).catch(e => alert("Không thể khởi chạy camera: " + e));
      });
    }

    async function stopCamera() {
      const zoomContainer = document.getElementById('zoomContainer');
      if (zoomContainer) zoomContainer.remove();
      document.getElementById('cameraContainer').classList.add('hidden');

      if (html5QrCode && isCamOpen) {
        try {
          await html5QrCode.stop();
          isCamOpen = false;
        } catch (err) {
          console.log("Lỗi khi dừng camera: " + err);
        }
      }
    }

    async function switchCamera() {
      if (!isCamOpen) return;
      
      const zoomContainer = document.getElementById('zoomContainer');
      if (zoomContainer) zoomContainer.remove();
      
      await html5QrCode.stop();
      isCamOpen = false;

      currentCamIndex = (currentCamIndex + 1) % validBackCameras.length;
      startScanning(validBackCameras[currentCamIndex].id);
    }

    function setupZoomControls() {
      const oldZoom = document.getElementById('zoomContainer');
      if (oldZoom) oldZoom.remove();

      try {
        const scannerTrack = html5QrCode.getRunningTrack();
        const capabilities = scannerTrack.getCapabilities();
        
        if (capabilities.zoom) {
          const minZoom = capabilities.zoom.min || 1;
          const maxZoom = capabilities.zoom.max || 5;
          const stepZoom = capabilities.zoom.step || 0.1;

          const zoomHtml = `
            <div id="zoomContainer" class="w-full mt-3 px-2 flex items-center gap-3">
              <span class="text-xs font-semibold text-slate-500">1x</span>
              <input type="range" id="zoomSlider" min="${minZoom}" max="${maxZoom}" step="${stepZoom}" value="${minZoom}" 
                     class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
              <span class="text-xs font-semibold text-slate-500">${Math.round(maxZoom)}x</span>
            </div>
          `;
          
          document.getElementById('cameraContainer').insertAdjacentHTML('beforeend', zoomHtml);
          document.getElementById('zoomSlider').addEventListener('input', (e) => {
            scannerTrack.applyConstraints({ advanced: [{ zoom: parseFloat(e.target.value) }] }).catch(err => {});
          });
        }
      } catch (err) { console.log(err); }
    }

    function checkinByImage(event) {
      if (!factorySelect.value) {
        alert("⚠️ Vui lòng chọn Nhà máy thực hiện điểm danh trước khi tải ảnh!");
        event.target.value = ""; 
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      if (isCamOpen) { stopCamera(); }

      showResultModal(true, "⏳ Đang quét ảnh", "Đang phân tích cấu trúc hình ảnh để tìm mã QR...");

      // Hiện khung chứa tạm để imageScanner có một box gắn kết trong cấu trúc của thư viện
      document.getElementById('cameraContainer').classList.remove('hidden');

      const imageScanner = new Html5Qrcode("qrReader");
      imageScanner.scanFile(file, true)
        .then(rawText => {
          closeModal(); 
          document.getElementById('cameraContainer').classList.add('hidden');
          const parts = rawText.split('|');
          const cccd = (parts.length >= 1) ? parts[0].trim() : "";
          
          if (cccd.length === 12) {
            executeAttendanceApi(cccd); 
          } else {
            showResultModal(false, "Lỗi Mã QR", "Mã QR trong file ảnh không chứa định dạng CCCD gắn chíp hợp lệ.");
          }
          event.target.value = ""; 
        })
        .catch(err => {
          event.target.value = "";
          document.getElementById('cameraContainer').classList.add('hidden');
          showResultModal(false, "Không đọc được mã", "Hệ thống không tìm thấy mã QR nào trong ảnh. Hãy chắc chắn ảnh rõ nét, vuông góc và không bị lóa mờ.");
        });
    }

    function processQrData(rawText) {
      if (html5QrCode && isCamOpen) {
        stopCamera().then(() => {
          const parts = rawText.split('|');
          const cccd = (parts.length >= 1) ? parts[0].trim() : "";
          if (cccd.length === 12) {
            executeAttendanceApi(cccd);
          } else {
            showResultModal(false, "Lỗi Mã QR", "Mã QR quét được không phải định dạng thẻ CCCD gắn chíp hợp lệ.");
          }
        });
      }
    }

    function submitManualAttendance() {
      if (!factorySelect.value) { alert("⚠️ Vui lòng chọn Nhà máy thực hiện điểm danh!"); return; }
      const cccdVal = document.getElementById('manualCccd').value.trim();
      if (cccdVal.length !== 12 || isNaN(cccdVal)) { alert("⚠️ Số CCCD nhập tay phải bao gồm đúng 12 con số!"); return; }
      executeAttendanceApi(cccdVal);
    }

    function executeAttendanceApi(cccdNumber) {
      document.getElementById('manualCccd').value = ""; 
      const payload = { action: 'attendance', factoryName: factorySelect.value, cccd: cccdNumber };
      showResultModal(true, "⏳ Đang kiểm tra", "Đang tra soát danh sách và đối chiếu chéo các nhà thầu trên File Tổng...");

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data && data.success) { showResultModal(true, "Thành Công", data.message); }
        else { showResultModal(false, "Thất Bại", data.message); }
      })
      .catch(err => { showResultModal(false, "Lỗi Kết Nối", "Không thể hoàn thành điểm danh do mất tín hiệu đường truyền Internet."); });
    }

    function showResultModal(isSuccess, title, msg) {
      const modalIcon = document.getElementById('modalIcon');
      const modalBox = document.getElementById('modalBox');
      
      if (isSuccess && title !== "⏳ Đang kiểm tra" && title !== "⏳ Đang quét ảnh") {
        modalIcon.innerText = "✓";
        modalIcon.className = "w-16 h-16 bg-emerald-900/50 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl border border-emerald-500";
        modalBox.className = "bg-slate-800 rounded-3xl p-6 w-full max-w-sm text-center border border-emerald-500/50 shadow-2xl";
      } else if (title.indexOf("⏳") !== -1) {
        modalIcon.innerText = "⏳";
        modalIcon.className = "w-16 h-16 bg-amber-900/50 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl border border-amber-500";
        modalBox.className = "bg-slate-800 rounded-3xl p-6 w-full max-w-sm text-center border border-amber-500/50 shadow-2xl";
      } else {
        modalIcon.innerText = "✕";
        modalIcon.className = "w-16 h-16 bg-red-900/50 text-red-400 rounded-full flex items-center justify-center mx-auto mb-3 text-3xl border border-red-500";
        modalBox.className = "bg-slate-800 rounded-3xl p-6 w-full max-w-sm text-center border border-red-500/50 shadow-2xl";
      }
      
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMsg').innerText = msg;
      document.getElementById('resultModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('resultModal').classList.add('hidden');
    }
  </script>
</body>
</html>
