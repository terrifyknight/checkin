<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HỆ THỐNG ĐIỂM DANH THEO LÔ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-900 p-3 flex flex-col items-center justify-start">

  <div class="w-full max-w-lg bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden mt-6">
    
    <!-- HEADER ĐIỂM DANH NỘI BỘ -->
    <div class="bg-gradient-to-r from-emerald-600 to-teal-600 px-6 py-5 text-white flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold tracking-tight">CỔNG ĐIỂM DANH THEO LÔ</h1>
        <p class="text-emerald-100 text-[11px] mt-0.5">Quét liên tục nhiều người rồi nhấn Xác nhận gửi 1 lần.</p>
      </div>
      <button type="button" onclick="toggleCamera()" class="p-2.5 bg-white/20 hover:bg-white/30 rounded-full transition-all text-white flex items-center justify-center cursor-pointer">
        <svg id="camIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      </button>
    </div>

    <!-- KHUNG TRẠNG THÁI QUÉT NHANH -->
    <div id="scanStatus" class="bg-emerald-950 border-b border-emerald-800 text-center py-2 text-xs text-emerald-400 font-semibold hidden">
      ⚡ Đã thêm số CCCD vào danh sách chờ!
    </div>

    <div id="camContainer" class="bg-black overflow-hidden transition-all duration-300 max-h-0">
      <div class="p-4 flex flex-col items-center">
        <div id="qrReader" class="w-full rounded-2xl overflow-hidden bg-black max-w-[280px]"></div>
      </div>
    </div>

    <div class="p-6 space-y-5">
      <div>
        <label class="block text-sm font-bold text-slate-300 mb-1.5" for="ck_factory">Nhà máy phỏng vấn hôm nay *</label>
        <select id="ck_factory" required class="w-full px-4 py-2.5 rounded-xl border border-slate-600 bg-slate-700 text-white font-medium">
          <option value="">-- Chọn Nhà máy đối chiếu --</option>
          <option value="FUSHAN">FUSHAN</option>
          <option value="HONHAI-FK">HONHAI-FK / FUKANG</option>
          <option value="LUXE QC2&3">LUXE QC2&3</option>
          <option value="LUXE QC1">LUXE QC1</option>
          <option value="GTK NAM SƠN">GTK NAM SƠN</option>
          <option value="NEWWING">NEWWING</option>
        </select>
      </div>

      <!-- DANH SÁCH CHỜ ĐIỂM DANH TẠM THỜI -->
      <div class="border-t border-slate-700 pt-4">
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-bold text-slate-300">Danh sách chờ gửi (<span id="queueCount">0</span> người):</label>
          <button type="button" onclick="clearQueue()" class="text-xs text-rose-400 font-semibold hover:underline">Xóa tất cả</button>
        </div>
        <div id="queueList" class="bg-slate-900 border border-slate-700 rounded-xl p-3 max-h-40 overflow-y-auto text-slate-400 font-mono text-sm space-y-1 text-center">
          <div id="emptyTip" class="text-slate-500 italic py-4 text-xs">Chưa có dữ liệu. Hãy bật Camera quét mã QR để thêm nhanh lao động...</div>
        </div>
      </div>

      <button type="button" onclick="submitBulkCheckin()" id="btnBulkCheckin" class="w-full mt-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold py-3 rounded-xl shadow-lg cursor-pointer flex items-center justify-center space-x-2">
        <span>Xác nhận điểm danh hàng loạt</span>
      </button>
    </div>
  </div>

  <!-- POPUP THÔNG BÁO KẾT QUẢ -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 backdrop-blur-sm z-50">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl">
      <div id="modalIcon" class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl">✓</div>
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">Kết quả đối chiếu</h2>
      <div id="modalMsg" class="text-sm text-slate-600 mb-5 leading-relaxed bg-slate-50 p-3 rounded-xl border text-left font-medium whitespace-pre-line max-h-60 overflow-y-auto"></div>
      <button onclick="closeModal()" class="w-full bg-slate-800 text-white font-medium py-2.5 rounded-xl">Đóng thông báo</button>
    </div>
  </div>

  <script>
    // Link Web App của file Google Sheets Tổng hợp
    const API_URL = "https://script.google.com/macros/s/AKfycbxEuShit4dCUQI_eL-Bw08QdFwU9h40drSMywOdC4TR1XO9NVbUadOOgWSs8PDSUCJm/exec"; 

    let html5QrCode = null, isCamOpen = false;
    let cccdQueue = []; 

    function toggleCamera() {
      const container = document.getElementById('camContainer'), icon = document.getElementById('camIcon');
      if (!isCamOpen) {
        container.style.maxHeight = "400px"; html5QrCode = new Html5Qrcode("qrReader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 230 }, (msg) => { handleDecodedText(msg); }, (err) => {}).then(() => { isCamOpen = true; icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke="currentColor"></path>'; });
      } else { stopCamera(); }
    }

    function stopCamera() {
      if (html5QrCode && isCamOpen) {
        html5QrCode.stop().then(() => { document.getElementById('camContainer').style.maxHeight = "0px"; isCamOpen = false; });
      }
    }

    function handleDecodedText(rawText) {
      if (!rawText) return;
      const parts = rawText.split('|');
      let scannedCccd = "";

      if (parts.length > 0 && parts[0].length === 12 && /^\d+$/.test(parts[0])) {
        scannedCccd = parts[0].trim();
      } else {
        const cleanText = rawText.trim();
        if (cleanText.length === 12 && /^\d+$/.test(cleanText)) scannedCccd = cleanText;
      }

      if (scannedCccd) {
        if (!cccdQueue.includes(scannedCccd)) {
          if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(80); 
          cccdQueue.push(scannedCccd);
          updateQueueUI();
          
          const statusBox = document.getElementById('scanStatus');
          statusBox.classList.remove('hidden');
          setTimeout(() => statusBox.classList.add('hidden'), 1000);
        }
      }
    }

    function updateQueueUI() {
      const listDiv = document.getElementById('queueList');
      const countSpan = document.getElementById('queueCount');
      countSpan.innerText = cccdQueue.length;

      if (cccdQueue.length === 0) {
        listDiv.innerHTML = '<div id="emptyTip" class="text-slate-500 italic py-4 text-xs">Chưa có dữ liệu. Hãy bật Camera quét mã QR để thêm nhanh lao động...</div>';
        return;
      }

      listDiv.innerHTML = cccdQueue.map((cccd, index) => `
        <div class="flex items-center justify-between bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 my-1">
          <span>${index + 1}. ${cccd}</span>
          <button type="button" onclick="removeSingleRow(${index})" class="text-rose-400 text-xs font-bold hover:text-rose-500 px-1">✕</button>
        </div>
      `).join('');
    }

    function removeSingleRow(index) {
      cccdQueue.splice(index, 1);
      updateQueueUI();
    }

    function clearQueue() {
      cccdQueue = [];
      updateQueueUI();
    }

    function submitBulkCheckin() {
      const factory = document.getElementById('ck_factory').value;
      if (!factory) { alert("Vui lòng chọn Nhà máy đối chiếu trước khi gửi lô!"); return; }
      if (cccdQueue.length === 0) { alert("Danh sách chờ trống. Vui lòng quét ít nhất 1 CCCD!"); return; }

      const btn = document.getElementById('btnBulkCheckin');
      btn.disabled = true; btn.innerHTML = "⏳ Đang đồng bộ " + cccdQueue.length + " hồ sơ...";
      stopCamera();

      const payload = {
        action: 'checkin_bulk',
        factoryName: factory,
        cccdList: cccdQueue
      };
      
      fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) })
      .then(res => res.json()).then(data => {
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận điểm danh hàng loạt</span>";
        if (data && data.success) {
          cccdQueue = []; 
          updateQueueUI();
          showModal(true, "Kết quả xử lý theo lô", data.message);
        } else {
          showModal(false, "Thao Tác Thất Bại", data.message);
        }
      })
      .catch(err => { 
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận điểm danh hàng loạt</span>";
        showModal(false, "Lỗi kết nối mạng", "Không thể truyền gói dữ liệu theo lô lên Google Sheets Tổng."); 
      });
    }

    function showModal(isSuccess, title, msg) {
      const icon = document.getElementById('modalIcon');
      if(isSuccess) {
        icon.className = "w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl"; icon.innerText = "✓";
      } else {
        icon.className = "w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-3 text-rose-600 text-3xl"; icon.innerText = "✕";
      }
      document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerText = msg;
      document.getElementById('successModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('successModal').classList.add('hidden'); }
  </script>
</body>
</html>
